<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LightRAG UI</title>
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>
<style>
  /* System font stacks — no external font dependencies */
  * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
  code, pre, kbd { font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace !important; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #f0f0f0;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  /* Mobile responsive */
  @media (max-width: 768px) {
    aside { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); transition: transform 200ms ease; }
    aside.open { transform: translateX(0); box-shadow: 8px 0 24px rgba(0,0,0,0.6); }
    .mobile-menu-btn { display: flex !important; }
    .mobile-overlay { display: block !important; }
  }
  .mobile-menu-btn { display: none; align-items: center; justify-content: center; width: 32px; height: 32px; border: 1px solid #2a2a2a; border-radius: 6px; background: #111; color: #888; cursor: pointer; }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
  input::placeholder { color: #3a3a3a; }
  button { font-family: 'Inter', sans-serif; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .nav-item:hover { background: #141414 !important; }
  .nav-item.active { background: #1a1530 !important; }
  tr:hover td { background: inherit; }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>

<script src="api.js"></script>
<script type="text/babel" src="split-view.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="document-viewer.jsx"></script>
<script type="text/babel" src="search-view.jsx"></script>
<script type="text/babel" src="graph-view.jsx"></script>
<script type="text/babel" src="documents-view.jsx"></script>
<script type="text/babel" src="pipeline-panel.jsx"></script>
<script type="text/babel" src="health-view.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#22c55e",
  "serverOnline": true,
  "sidebarWidth": 240
}/*EDITMODE-END*/;

const VIEW_LABELS = {
  search:    'Search',
  graph:     'Graph Explorer',
  documents: 'Documents',
  health:    'Health',
};

function App() {
  const [view, setView] = React.useState('search');
  const [rightView, setRightView] = React.useState(null);
  const [docsQuery, setDocsQuery] = React.useState('');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = React.useState(false);
  const [mobileMenu, setMobileMenu] = React.useState(false);

  // Bridge: Graph entity panel calls this to jump to Documents pre-filtered
  React.useEffect(() => {
    window.__navigateToDocs = (q) => {
      setDocsQuery(q || '');
      // If split-view active and Documents already in either pane, just update query.
      // Otherwise open Documents in the right pane (split) so context (graph) is preserved.
      if (view === 'documents' || rightView === 'documents') return;
      setRightView('documents');
    };
    return () => { delete window.__navigateToDocs; };
  }, [view, rightView]);

  const renderPane = (id) => {
    if (id === 'search')    return <SearchView />;
    if (id === 'graph')     return <GraphView />;
    if (id === 'documents') return <DocumentsView initialQuery={docsQuery} />;
    if (id === 'health')    return <HealthView />;
    return null;
  };

  const openSplit = () => {
    const fallback = ['graph', 'documents', 'health', 'search'].find(v => v !== view);
    setRightView(fallback);
  };

  // Tweaks panel protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <div className={mobileMenu ? 'mobile-overlay' : ''} onClick={() => setMobileMenu(false)}></div>
      <aside className={mobileMenu ? 'open' : ''} style={{ display: 'contents' }}>
        <Sidebar
          active={view}
          onNav={(id) => { setView(id); setMobileMenu(false); }}
          serverOnline={tweaks.serverOnline}
        />
      </aside>

      <main style={{
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        overflow: 'hidden',
        background: '#0a0a0a',
        position: 'relative',
      }}>
        {/* Topbar */}
        <div style={appStyles.topbar}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
            <button className="mobile-menu-btn" onClick={() => setMobileMenu(m => !m)}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <line x1="2" y1="3" x2="12" y2="3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="2" y1="11" x2="12" y2="11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </button>
            <div style={appStyles.breadcrumb}>
            <span style={appStyles.breadcrumbRoot}>LightRAG</span>
            <span style={appStyles.breadcrumbSep}>/</span>
            <span style={appStyles.breadcrumbCurrent}>{VIEW_LABELS[view]}</span>
          </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            {view === 'search' && (
              <kbd style={appStyles.shortcut}>⌘K</kbd>
            )}
            <button
              onClick={() => rightView ? setRightView(null) : openSplit()}
              title={rightView ? 'Close split view' : 'Open split view'}
              style={{
                display: 'flex', alignItems: 'center', gap: '6px',
                padding: '4px 9px', borderRadius: '5px',
                border: `1px solid ${rightView ? '#7c6af740' : '#1f1f1f'}`,
                background: rightView ? '#1a1530' : 'transparent',
                color: rightView ? '#a78bfa' : '#666',
                cursor: 'pointer', fontSize: '11px',
                fontFamily: "'JetBrains Mono', monospace",
              }}
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <rect x="1" y="2" width="10" height="8" rx="1" stroke="currentColor" strokeWidth="1" fill="none"/>
                <line x1="6" y1="2" x2="6" y2="10" stroke="currentColor" strokeWidth="1"/>
              </svg>
              <span>Split</span>
            </button>
            <div style={{
              fontSize: '10px', fontFamily: "'JetBrains Mono', monospace",
              color: '#2a2a2a', padding: '3px 8px', border: '1px solid #1a1a1a',
              borderRadius: '4px',
            }}>
              v0.1.0
            </div>
          </div>
        </div>

        {/* View content */}
        <div style={{ flex: 1, overflow: 'hidden' }}>
          {rightView ? (
            <SplitView
              leftView={view}
              rightView={rightView}
              renderPane={renderPane}
              onCloseRight={() => setRightView(null)}
              onChangeRight={setRightView}
              viewLabels={VIEW_LABELS}
            />
          ) : (
            <>
              {view === 'search'    && <SearchView />}
              {view === 'graph'     && <GraphView />}
              {view === 'documents' && <DocumentsView />}
              {view === 'health'    && <HealthView />}
            </>
          )}
        </div>
      </main>

      {/* Tweaks panel */}
      {tweakOpen && (
        <div style={appStyles.tweakPanel}>
          <div style={appStyles.tweakHeader}>
            <span style={{ fontSize: '12px', color: '#888', fontFamily: "'JetBrains Mono', monospace" }}>Tweaks</span>
            <button style={appStyles.tweakClose} onClick={() => {
              setTweakOpen(false);
              window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
            }}>✕</button>
          </div>

          <div style={appStyles.tweakSection}>
            <div style={appStyles.tweakLabel}>Accent color</div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {['#7c6af7','#3b82f6','#22c55e','#f59e0b','#ec4899'].map(c => (
                <button key={c} onClick={() => setTweak('accentColor', c)} style={{
                  width: '22px', height: '22px', borderRadius: '50%',
                  background: c, border: tweaks.accentColor === c ? '2px solid #fff' : '2px solid transparent',
                  cursor: 'pointer',
                }} />
              ))}
            </div>
          </div>

          <div style={appStyles.tweakSection}>
            <div style={appStyles.tweakLabel}>Server status</div>
            <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
              <input
                type="checkbox"
                checked={tweaks.serverOnline}
                onChange={e => setTweak('serverOnline', e.target.checked)}
                style={{ accentColor: '#7c6af7' }}
              />
              <span style={{ fontSize: '12px', color: tweaks.serverOnline ? '#22c55e' : '#ef4444' }}>
                {tweaks.serverOnline ? 'Online' : 'Offline'}
              </span>
            </label>
          </div>

          <div style={appStyles.tweakSection}>
            <div style={appStyles.tweakLabel}>Active view</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {Object.entries(VIEW_LABELS).map(([id, label]) => (
                <button key={id} onClick={() => setView(id)} style={{
                  padding: '5px 10px', borderRadius: '5px', border: '1px solid',
                  borderColor: view === id ? '#7c6af740' : '#222',
                  background: view === id ? '#1a1530' : 'transparent',
                  color: view === id ? '#a78bfa' : '#555',
                  fontSize: '12px', cursor: 'pointer', textAlign: 'left',
                  fontFamily: "'Inter', sans-serif",
                }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const appStyles = {
  topbar: {
    height: '40px',
    borderBottom: '1px solid #141414',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    padding: '0 32px 0 40px',
    flexShrink: 0,
    background: '#0a0a0a',
  },
  breadcrumb: { display: 'flex', alignItems: 'center', gap: '6px' },
  breadcrumbRoot: { fontSize: '12px', color: '#333', fontFamily: "'JetBrains Mono', monospace" },
  breadcrumbSep: { fontSize: '12px', color: '#222' },
  breadcrumbCurrent: { fontSize: '12px', color: '#666', fontFamily: "'JetBrains Mono', monospace" },
  shortcut: {
    fontSize: '10px', fontFamily: "'JetBrains Mono', monospace", color: '#333',
    background: '#111', border: '1px solid #1f1f1f', borderRadius: '4px', padding: '2px 6px',
  },
  tweakPanel: {
    position: 'fixed', bottom: '16px', right: '16px', width: '220px',
    background: '#111', border: '1px solid #2a2a2a', borderRadius: '10px',
    boxShadow: '0 8px 32px rgba(0,0,0,0.6)', zIndex: 100,
    fontFamily: "'Inter', sans-serif",
  },
  tweakHeader: {
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    padding: '10px 12px', borderBottom: '1px solid #1f1f1f',
  },
  tweakClose: {
    background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: '11px',
  },
  tweakSection: { padding: '12px' , borderBottom: '1px solid #161616' },
  tweakLabel: { fontSize: '10px', color: '#444', fontFamily: "'JetBrains Mono', monospace", letterSpacing: '0.07em', marginBottom: '8px' },
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
